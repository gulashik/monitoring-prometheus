# alertmanager.yml — конфигурация Alertmanager
# Расположение по умолчанию: /etc/alertmanager/alertmanager.yml

# ============================================================
# GLOBAL — глобальные настройки, применяются ко всем блокам,
# если не переопределены локально
# ============================================================
global:
  # Через сколько времени считать алерт "разрешённым" (resolved),
  # если Prometheus перестал его присылать
  resolve_timeout: 5m

  # --- Настройки SMTP (для email-уведомлений) ---
  smtp_smarthost: 'smtp.gmail.com:587'   # адрес SMTP-сервера:порт
  smtp_from: 'alertmanager@example.com'  # отправитель
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'your_app_password' # пароль/app-password
  smtp_require_tls: true

  # --- Slack ---
  slack_api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'

  # --- Дефолтные HTTP-параметры (прокси и т.п.) ---
  # http_config:
  #   proxy_url: 'http://proxy:8080'

# ============================================================
# TEMPLATES — пользовательские шаблоны сообщений (Go templates)
# ============================================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ============================================================
# ROUTE — дерево маршрутизации. Определяет, куда и как
# отправлять алерты. Корневой route обязателен.
# ============================================================
route:
  # По каким меткам группировать алерты в одно уведомление
  group_by: ['alertname', 'cluster', 'service']

  # Сколько ждать перед отправкой ПЕРВОГО уведомления для новой группы
  # (даёт время накопить похожие алерты)
  group_wait: 30s

  # Интервал между уведомлениями о НОВЫХ алертах в уже существующей группе
  group_interval: 5m

  # Через сколько повторно слать уведомление, если алерт всё ещё активен
  repeat_interval: 4h

  # Приёмник по умолчанию (если не сработал ни один child-route)
  receiver: 'default-email'

  # --- Дочерние маршруты (проверяются по порядку) ---
  routes:
    # Критические алерты -> в PagerDuty/Slack, чаще повторять
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: false   # true = продолжить проверять следующие routes

    # Алерты конкретной команды по regex
    - match_re:
        service: ^(database|cache)$
      receiver: 'team-db'

    # Warning -> только email
    - match:
        severity: warning
      receiver: 'default-email'

# ============================================================
# INHIBIT_RULES — подавление одних алертов другими
# (например, не слать warning, если уже горит critical)
# ============================================================
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    # Подавление работает, только если совпадают эти метки
    equal: ['alertname', 'cluster', 'service']

# ============================================================
# RECEIVERS — приёмники уведомлений (каналы доставки)
# Дополнительные receiver - https://prometheus.io/docs/alerting/latest/configuration/#receiver-integration-settings
# ============================================================
receivers:
  - name: 'ntfy'
    webhook_configs:
      - url: 'http://ntfy:80/alerts?template=yaml'
        send_resolved: true

  - name: 'default-email'
    email_configs:
      - to: 'team@example.com'
        send_resolved: true   # слать уведомление о разрешении алерта
        headers:
          Subject: '{{ template "email.custom.subject" . }}'
        html: '{{ template "email.custom.html" . }}'

  - name: 'team-db'
    email_configs:
      - to: 'dba@example.com'
    # Можно комбинировать несколько каналов в одном receiver
    webhook_configs:
      - url: 'http://127.0.0.1:5001/'

  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '{{ template "slack.custom.title" . }}'
        text: '{{ template "slack.custom.text" . }}'
        color: '{{ template "slack.custom.color" . }}'

  - name: 'telegram'
    telegram_configs:
      - bot_token: '<token>'
        chat_id: -1001234567890
        parse_mode: 'HTML'
        message: '{{ template "telegram.custom.message" . }}'